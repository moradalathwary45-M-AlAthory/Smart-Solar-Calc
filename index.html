<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة المهندس مراد الأثوري - الشاملة</title>
    
    <meta property="og:title" content="حاسبة المهندس مراد الأثوري">
    <meta property="og:description" content="مهندس أنظمة طاقة متجددة | مؤسسة عادل الجرادي">
    <meta property="og:image" content="https://moradalathwary45-M-AlAthory.github.io/Smart-Solar-Calc/mur.png">
    <meta property="og:url" content="https://moradalathwary45-M-AlAthory.github.io/Smart-Solar-Calc/">

    <style>
        :root { --gold: #ffd54f; --orange: #ff9800; --bg: #07111f; --card: #0d1b2a; }
        body { margin: 0; font-family: Tahoma, sans-serif; background: var(--bg); color: #fff; padding: 15px; }
        .main-card { max-width: 600px; margin: auto; background: var(--card); border: 2px solid #1d3557; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .profile-img { width: 120px; height: 120px; border-radius: 15px; display: block; margin: 0 auto 15px; border: 3px solid var(--orange); object-fit: cover; background: #13263d; }
        h2 { text-align: center; color: var(--gold); margin: 10px 0 5px; }
        .sub-text { text-align: center; color: #9ecbff; font-size: 14px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 5px; color: #9ecbff; font-size: 13px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #1d3557; background: #13263d; color: #fff; box-sizing: border-box; }
        .btn-calc { width: 100%; padding: 18px; margin-top: 20px; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--orange), #f44336); color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; }
        .res-box { background: #1a2a3a; border: 2px solid var(--orange); border-radius: 15px; padding: 20px; margin-top: 25px; animation: fadeIn 0.5s; }
        .section-title { color: var(--gold); border-bottom: 1px solid var(--orange); padding-bottom: 5px; margin: 15px 0 10px; font-size: 16px; text-align: center; }
        .res-row { display: flex; justify-content: space-between; border-bottom: 1px solid #2d4059; padding: 12px 0; align-items: center; }
        .res-val { color: var(--gold); font-weight: bold; font-size: 18px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-card">
    <img src="mur.png" class="profile-img" alt="المهندس مراد">
    <h2>المهندس مراد الأثوري</h2>
    <div class="sub-text">مهندس أنظمة طاقة متجددة | مؤسسة عادل الجرادي</div>

    <div class="grid">
        <div class="full"><label>حمل النهار (وات)</label><input type="number" id="p_day" placeholder="1500"></div>
        <div><label>ساعات النهار</label><input type="number" id="h_day" placeholder="6"></div>
        <div class="full"><label>حمل الليل (وات)</label><input type="number" id="p_night" placeholder="500"></div>
        <div><label>ساعات الليل</label><input type="number" id="h_night" placeholder="10"></div>
        <div class="full"><label>قدرة اللوح المتوفر (وات)</label><input type="number" id="panel_w" placeholder="550"></div>
        <div class="full">
            <label>نوع البطاريات</label>
            <select id="b_tech">
                <option value="0.8">ليثيوم LiFePO4 (تفريغ 80%)</option>
                <option value="0.5">جل/أسيد Deep Cycle (تفريغ 50%)</option>
            </select>
        </div>
        <div class="full"><label>سعة البطارية (Ah)</label><input type="number" id="b_ah" placeholder="200"></div>
        <div class="full">
            <label>جهد النظام (V)</label>
            <select id="sys_v">
                <option value="12">12V</option>
                <option value="24">24V</option>
                <option value="48" selected>48V</option>
            </select>
        </div>
    </div>

    <button class="btn-calc" onclick="generateFullReport()">إصدار التقرير الفني المتكامل</button>
    <div id="report-area"></div>
</div>

<script>
function generateFullReport() {
    // البيانات الأساسية (بدون تغيير)
    const pD = parseFloat(document.getElementById('p_day').value) || 1500;
    const hD = parseFloat(document.getElementById('h_day').value) || 6;
    const pN = parseFloat(document.getElementById('p_night').value) || 500;
    const hN = parseFloat(document.getElementById('h_night').value) || 10;
    const pW = parseFloat(document.getElementById('panel_w').value) || 550;
    const bAh = parseFloat(document.getElementById('b_ah').value) || 200;
    const vS = parseFloat(document.getElementById('sys_v').value);
    const dod = parseFloat(document.getElementById('b_tech').value);

    // الحسابات الأصلية (كما هي)
    const totalE = (pD * hD) + (pN * hN);
    const numPanels = Math.ceil(totalE / (pW * 5 * 0.8));
    const reqAh = (pN * hN / vS) / dod;
    const numBatt = Math.ceil(reqAh / bAh);
    const totalKwh = ((numBatt * bAh * vS) / 1000).toFixed(1); 
    const invSize = (Math.max(pD, pN) * 1.3 / 1000).toFixed(1);

    // حسابات الأسلاك والقواطع (الميزات الجديدة)
    const dcAmp = (Math.max(pD, pN) / vS) * 1.25;
    let dcWire = dcAmp <= 30 ? 6 : dcAmp <= 50 ? 10 : dcAmp <= 80 ? 16 : dcAmp <= 110 ? 25 : 35;
    const acBreaker = Math.ceil((Math.max(pD, pN) / 220) * 1.2);

    document.getElementById('report-area').innerHTML = `
        <div class="res-box">
            <div class="section-title">📋 مكونات المنظومة الأساسية</div>
            <div class="res-row"><span>عدد الألواح:</span><span class="res-val">${numPanels} ألواح</span></div>
            <div class="res-row"><span>عدد البطاريات:</span><span class="res-val">${numBatt} (سعة: ${totalKwh} kWh)</span></div>
            <div class="res-row"><span>الإنفيرتر المقترح:</span><span class="res-val">${invSize} kW</span></div>

            <div class="section-title">⚙️ التوصيلات والحماية</div>
            <div class="res-row"><span>سلك البطاريات (DC):</span><span class="res-val">${dcWire} ملم²</span></div>
            <div class="res-row"><span>قاطع البطاريات:</span><span class="res-val">${Math.ceil(dcAmp)} A (DC)</span></div>
            <div class="res-row"><span>قاطع الخرج (AC):</span><span class="res-val">${acBreaker} A (AC)</span></div>
            <div class="res-row"><span>نوع السلك للألواح:</span><span class="res-val">Solar Cable 6mm²</span></div>

            <button onclick="window.print()" style="background:#2ecc71; color:#fff; width:100%; padding:12px; border-radius:10px; border:none; margin-top:15px; cursor:pointer;">حفظ كـ PDF</button>
        </div>
    `;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
    </html>
